name: Deploy to Hostinger

on:
  push:
    branches:
      - main # Déclenche le workflow à chaque push sur la branche main

jobs:
  deploy:
    runs-on: ubuntu-latest # Utilise un runner Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Récupère le code du dépôt

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0 # Action pour configurer SSH
        with:
          ssh-private-key: ${{ secrets.SSH_PASS }} # Utilise le mot de passe SSH comme clé privée (pour sshpass)
          # Note: Si vous utilisez une clé SSH dédiée, utilisez ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Hostinger
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PATH: ${{ secrets.SSH_PATH }}
        run: |
          # Commande SSH pour se connecter et exécuter les commandes Git
          # Utilisation de sshpass pour l'authentification avec le mot de passe stocké dans le secret
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "cd $SSH_PATH && git fetch origin && git reset --hard origin/main"

          echo "Déploiement terminé sur Hostinger."
